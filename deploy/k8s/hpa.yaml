apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulse-service
  namespace: production
  labels:
    app: pulse-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulse-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
