# =============================================================================
# Pulse Service — Traefik IngressRoute
# Frontend: pulse.institutoitinerante.com.br
# Backend:  pulse.institutoitinerante.com.br/api/ (via Nginx proxy no frontend)
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulse-service-frontend
  namespace: production
  labels:
    app: pulse-service-frontend
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulse.institutoitinerante.com.br`)
      kind: Rule
      services:
        - name: pulse-service-frontend
          port: 80
  tls:
    certResolver: letsencrypt
